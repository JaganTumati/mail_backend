# ==========================================
#  Disposable Mail - Backend (Railway-ready)
# ==========================================

spring.application.name=disposable-mail-backend

# Railway injects PORT automatically; falls back to 8080 locally
server.port=${PORT:8080}

# ── MySQL Database ──────────────────────────────────────────────────
# Railway's MySQL plugin provides MYSQLHOST, MYSQLPORT, MYSQLDATABASE,
# MYSQLUSER, MYSQLPASSWORD automatically when you attach the plugin.
# Locally, these fall back to a standard local MySQL setup.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:disposable_mail}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:localdevpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Mail Domain ────────────────────────────────────────────────────
mail.domain=${MAIL_DOMAIN:tempmail.local}

# ── Embedded SMTP Listener ─────────────────────────────────────────
# ⚠ MUST be false on Railway/Render/Heroku — these platforms block
# inbound port 25 and won't let you bind it anyway. Use the
# /api/inbound-email webhook (InboundEmailController) with Mailgun
# Routes or SendGrid Inbound Parse instead. Set to true only when
# self-hosting on a VPS with Postfix (see DEPLOYMENT.sh).
smtp.enabled=${SMTP_ENABLED:false}
smtp.port=${SMTP_PORT:25}

# ── Auto-Cleanup ───────────────────────────────────────────────────
mail.cleanup.hours=${CLEANUP_HOURS:24}

# ── CORS ───────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins.
# Set this in Railway's env vars to your Netlify URL, e.g.:
# https://your-app.netlify.app
allowed.origins=${ALLOWED_ORIGINS:*}
